<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProBet вҖ” Dashboard 7 DГӯas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:linear-gradient(160deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);
  --card:#ffffff;
  --td:#0f172a;--tg:#64748b;--tl:#94a3b8;
  --a1:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);
  --a2:linear-gradient(135deg,#0f766e 0%,#0ea5e9 100%);
  --a3:linear-gradient(135deg,#dc2626 0%,#ea580c 100%);
  --a4:linear-gradient(135deg,#1d4ed8 0%,#7c3aed 100%);
  --ton:linear-gradient(135deg,#f97316 0%,#fbbf24 100%);
  --line:linear-gradient(90deg,#6366f1,#8b5cf6,#ec4899);
  --glow:0 0 20px rgba(99,102,241,.25);
  --r:16px;--rm:10px;
  --f:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
body{font-family:var(--f);background:var(--bg);min-height:100vh;color:#fff}
.wrap{max-width:680px;margin:0 auto;padding:1rem 1rem 4rem}

/* в”Җв”Җв”Җ HEADER в”Җв”Җв”Җ */
.hdr{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);padding:10px 16px;border-radius:22px;margin-bottom:1rem;backdrop-filter:blur(10px)}
.logo{font-size:18px;font-weight:800;background:var(--a1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-date{margin-left:auto;font-size:10px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.06);padding:3px 10px;border-radius:10px}

/* в”Җв”Җв”Җ DATE STRIP в”Җв”Җв”Җ */
.dstrip{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:.85rem;scrollbar-width:none}
.dstrip::-webkit-scrollbar{display:none}
.db{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:6px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.1);cursor:pointer;background:rgba(255,255,255,.04);min-width:48px;transition:all .2s;color:#fff}
.db:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.db.active{background:var(--ton);border-color:transparent;box-shadow:0 4px 14px rgba(249,115,22,.4)}
.db .dn{font-size:8px;opacity:.6;text-transform:uppercase;letter-spacing:.4px}
.db .dd{font-size:16px;font-weight:700;line-height:1.1}
.db .dm{font-size:8px;opacity:.5}
.db.active .dn,.db.active .dd,.db.active .dm{opacity:1}
.db.today .dd{color:#fbbf24}
.db.active.today .dd{color:#fff}

/* в”Җв”Җв”Җ SPORT TABS в”Җв”Җв”Җ */
.stabs{display:flex;gap:5px;margin-bottom:.85rem;overflow-x:auto;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{padding:7px 16px;font-size:12px;font-weight:700;color:rgba(255,255,255,.6);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:var(--f)}
.stab:hover{background:rgba(255,255,255,.12);color:#fff}
.stab.active{background:var(--a1);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.stab.t-active{background:var(--a2);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(14,165,233,.3)}
.stab.n-active{background:var(--a3);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(220,38,38,.3)}
.stab.c-active{background:var(--ton);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(249,115,22,.3)}

/* в”Җв”Җв”Җ LEAGUE FILTER в”Җв”Җв”Җ */
.lfilt{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.75rem}
.lf{padding:3px 10px;font-size:10px;font-weight:600;color:rgba(255,255,255,.5);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:12px;cursor:pointer;transition:all .15s;font-family:var(--f)}
.lf:hover{background:rgba(255,255,255,.1);color:#fff}
.lf.active{background:rgba(99,102,241,.3);border-color:rgba(99,102,241,.5);color:#a5b4fc}

/* в”Җв”Җв”Җ SECTION HEAD в”Җв”Җв”Җ */
.sh{display:flex;align-items:center;gap:8px;margin:1rem 0 .6rem}
.sh-ico{font-size:14px}
.sh-lbl{font-size:10px;font-weight:700;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.7)}
.sh-line{flex:1;height:1px;background:var(--line);opacity:.4;border-radius:1px}

/* в”Җв”Җв”Җ MATCH CARD в”Җв”Җв”Җ */
.mc{background:rgba(255,255,255,.97);border-radius:var(--r);margin-bottom:.75rem;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.2);color:var(--td);cursor:pointer;transition:transform .15s,box-shadow .15s}
.mc:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.25)}
.mc-head{display:flex;align-items:center;gap:8px;padding:10px 14px;color:#fff}
.mc-head.fut{background:var(--a1)}
.mc-head.ten{background:var(--a2)}
.mc-head.nba-h{background:var(--a3)}
.mc-head.ucl{background:var(--a4)}
.mc-time{font-size:10px;font-weight:700;background:rgba(255,255,255,.22);padding:3px 8px;border-radius:10px;white-space:nowrap}
.mc-live-badge{font-size:9px;font-weight:800;background:#ef4444;padding:3px 8px;border-radius:10px;animation:pu 1s infinite;white-space:nowrap}
.mc-title{flex:1;font-size:12px;font-weight:700;line-height:1.3}
.mc-ctx{font-size:9px;background:rgba(0,0,0,.2);padding:2px 7px;border-radius:8px;white-space:nowrap}
.mc-arrow{font-size:12px;opacity:.6;margin-left:4px;transition:transform .2s}
.mc:hover .mc-arrow{transform:translateX(3px)}

/* в”Җв”Җв”Җ QUICK STATS в”Җв”Җв”Җ */
.qstats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid #f1f5f9}
.qs{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;text-align:center}
.qs:not(:last-child){border-right:1px solid #f1f5f9}
.qs-v{font-size:14px;font-weight:800;color:var(--td)}
.qs-l{font-size:8px;color:var(--tl);text-transform:uppercase;letter-spacing:.3px}
.form{display:flex;gap:2px;margin-top:2px}
.fd{width:12px;height:12px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#fff}
.fW{background:#16a34a}.fD{background:#94a3b8}.fL{background:#dc2626}

/* в”Җв”Җв”Җ PROB BAR в”Җв”Җв”Җ */
.pb-w{padding:0 14px 8px}
.pb-l{display:flex;justify-content:space-between;font-size:9px;color:var(--tg);margin-bottom:3px;font-weight:700}
.pbar{height:6px;border-radius:3px;background:#e2e8f0;overflow:hidden;display:flex}
.ph{background:#6366f1}.pd{background:#94a3b8}.pa{background:#f97316}
.pa2{background:#dc2626}

/* в”Җв”Җв”Җ ODDS в”Җв”Җв”Җ */
.odds{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 14px 10px}
.odds2{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 14px 10px}
.ob{display:flex;flex-direction:column;align-items:center;gap:3px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:9px;padding:8px 3px;transition:all .15s}
.ob:hover{border-color:#6366f1}
.ol{font-size:8px;color:var(--tg);text-transform:uppercase;font-weight:700;text-align:center;letter-spacing:.3px}
.ov{font-size:16px;font-weight:800;color:var(--td)}
.ob.best{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#86efac}
.ob.best .ov{color:#15803d}
.ob.best .ol{color:#16a34a}

/* в”Җв”Җв”Җ SCORE в”Җв”Җв”Җ */
.score-wrap{display:flex;align-items:center;justify-content:center;gap:16px;padding:10px 14px;border-bottom:1px solid #f1f5f9}
.sc-team{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.sc-n{font-size:11px;font-weight:700;color:var(--td);text-align:center}
.sc-pts{font-size:26px;font-weight:800;color:var(--td)}
.sc-pts.win{color:#15803d}
.sc-vs{font-size:11px;color:var(--tl);font-weight:600}
.q-badge{background:#f1f5f9;border-radius:6px;padding:2px 7px;font-size:9px;font-weight:700;color:var(--tg)}
.live-q{background:#fef2f2;border-radius:6px;padding:2px 7px;font-size:9px;font-weight:700;color:#dc2626;animation:pu 1.2s infinite}

/* в”Җв”Җв”Җ TENNIS SETS в”Җв”Җв”Җ */
.sets-r{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid #f1f5f9}
.sp{font-size:11px;font-weight:700;color:var(--td);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbox{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:#f1f5f9;color:var(--tg)}
.sbox.w{background:#dcfce7;color:#15803d}
.sbox.lv{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.sboxes{display:flex;gap:3px}

/* в”Җв”Җв”Җ PICK ROW в”Җв”Җв”Җ */
.pick-row{display:flex;align-items:center;justify-content:space-between;padding:6px 14px 10px;border-top:1px solid #f1f5f9}
.pick-lbl{font-size:9px;color:var(--tg);font-weight:700;text-transform:uppercase}
.pick-chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{display:inline-flex;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700}
.chip-s{background:#dbeafe;color:#1d4ed8}
.chip-g{background:#fff7ed;color:#c2410c}
.chip-v{background:#fef9c3;color:#92400e}

/* в”Җв”Җв”Җ SECTIONS в”Җв”Җв”Җ */
.sport-sec{display:none}.sport-sec.active{display:block}
.day-sec{display:none}.day-sec.active{display:block}

/* в”Җв”Җв”Җ DETAIL VIEW (SPA) в”Җв”Җв”Җ */
#detail-view{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;overflow-y:auto;background:var(--bg)}
#detail-view.open{display:block;animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.dv-wrap{max-width:680px;margin:0 auto;padding:1rem 1rem 4rem}
.dv-back{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:1rem;padding:8px 0}
.dv-back:hover{color:#fff}
.dv-back span{font-size:18px}
.dv-hero{background:rgba(255,255,255,.97);border-radius:var(--r);overflow:hidden;margin-bottom:.75rem;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.dv-head{padding:14px 16px;color:#fff}
.dv-teams{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dv-team{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.dv-abbr{font-size:22px;font-weight:800}
.dv-tname{font-size:10px;opacity:.85;text-align:center}
.dv-vs{font-size:12px;opacity:.7;padding:0 8px}
.dv-score{font-size:36px;font-weight:800}
.dv-score-block{display:flex;flex-direction:column;align-items:center;gap:2px}
.dv-subscore{font-size:11px;opacity:.7}

/* Advanced stats grid */
.adv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:12px 14px;border-bottom:1px solid #f1f5f9}
.adv-card{background:#f8fafc;border-radius:8px;padding:10px}
.adv-label{font-size:9px;text-transform:uppercase;font-weight:700;color:var(--tg);letter-spacing:.4px;margin-bottom:6px}
.adv-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.adv-team{font-size:10px;font-weight:700;color:var(--td);min-width:30px}
.adv-bar-bg{flex:1;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.adv-bar-fill{height:100%;border-radius:3px}
.fill-h{background:#6366f1}.fill-a{background:#f97316}
.adv-val{font-size:10px;font-weight:700;color:var(--td);min-width:28px;text-align:right}

/* Stat compare row */
.cmp-row{display:grid;grid-template-columns:36px 1fr 36px;align-items:center;gap:6px;margin-bottom:6px}
.cmp-v{font-size:13px;font-weight:800;color:var(--td);text-align:center}
.cmp-name{font-size:9px;text-align:center;color:var(--tg);text-transform:uppercase}
.cmp-bar{height:5px;border-radius:3px;background:#e2e8f0;overflow:hidden;display:flex;margin-top:2px}

/* H2H */
.h2h-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f8fafc;font-size:11px;color:var(--td)}
.h2h-row:last-child{border-bottom:none}
.h2h-teams{flex:1;color:var(--tg)}
.h2h-score{font-weight:700}
.h2h-comp{font-size:9px;color:var(--tl)}

/* Injuries */
.injury-chip{display:inline-flex;align-items:center;gap:4px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:3px 8px;font-size:10px;font-weight:600;color:#991b1b;margin:2px}
.doubt-chip{background:#fff7ed;border-color:#fed7aa;color:#9a3412}

/* Value bets in detail */
.vbet-card{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac;border-radius:12px;padding:12px 14px;margin:8px 14px 12px}
.vbet-title{font-size:11px;font-weight:800;color:#15803d;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.vbet-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;padding:5px 0;border-bottom:1px solid rgba(134,239,172,.4)}
.vbet-row:last-child{border-bottom:none;margin-bottom:0}
.vbet-pick{flex:1;font-size:11px;font-weight:600;color:#166534}
.vbet-odd{font-size:14px;font-weight:800;color:#15803d}
.vbet-why{font-size:10px;color:#4ade80;font-style:italic}

/* NBA injury status */
.nba-player{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:11px;color:var(--td)}
.nba-player:last-child{border-bottom:none}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.s-ok{background:#22c55e}.s-doubt{background:#f59e0b}.s-out{background:#ef4444}
.nba-ppg{margin-left:auto;font-weight:700;font-size:12px}

/* в”Җв”Җв”Җ COMBOS в”Җв”Җв”Җ */
.combo-cat-title{display:flex;align-items:center;gap:8px;margin:1.2rem 0 .6rem}
.cat-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.3px}
.cat-dia{background:linear-gradient(135deg,#fbbf24,#f97316);color:#fff}
.cat-reto{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.cat-ten{background:linear-gradient(135deg,#0ea5e9,#0f766e);color:#fff}
.cat-nba{background:linear-gradient(135deg,#ea580c,#c2410c);color:#fff}
.combo{background:rgba(255,255,255,.97);border-radius:var(--r);margin-bottom:.75rem;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.2);color:var(--td)}
.combo-top{padding:12px 14px;color:#fff}
.combo-top.g{background:var(--a1)}.combo-top.r{background:var(--a3)}.combo-top.t{background:var(--a2)}.combo-top.n{background:var(--a3)}.combo-top.m{background:linear-gradient(135deg,#7c3aed,#c2410c)}
.ct-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.ct-title{font-size:13px;font-weight:800}
.ct-rb{font-size:9px;font-weight:800;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px}
.ct-sub{font-size:10px;color:rgba(255,255,255,.7)}
.c-legs{padding:4px 14px}
.leg{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid #f1f5f9}
.leg:last-child{border-bottom:none}
.leg-n{width:17px;height:17px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--tg);flex-shrink:0}
.leg-m{flex:1;font-size:10px;color:var(--tg)}
.leg-p{font-size:11px;font-weight:700;color:var(--td)}
.leg-o{font-size:11px;font-weight:800;color:var(--tl);min-width:30px;text-align:right}
.c-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#f8fafc;border-top:1px solid #f1f5f9}
.cf-l,.cf-r{display:flex;flex-direction:column;gap:1px}
.cf-r{align-items:flex-end}
.cf-lbl{font-size:8px;color:var(--tg);text-transform:uppercase;font-weight:700;letter-spacing:.4px}
.cf-val{font-size:20px;font-weight:800;color:var(--td)}
.cf-prob{font-size:14px;font-weight:800}
.cph{color:#15803d}.cpm{color:#d97706}.cpl{color:#dc2626}
.c-why{font-size:10px;color:var(--tg);padding:8px 14px;background:#fff;font-style:italic;border-top:1px solid #f8fafc;line-height:1.5}

.disclaimer{font-size:10px;color:rgba(255,255,255,.3);text-align:center;padding:.75rem 0;line-height:1.6;margin-top:.5rem}

/* в”Җв”Җв”Җ UTILITY в”Җв”Җв”Җ */
.section-inner{padding:0 14px}
.pad-x{padding:0 14px}
.pad-b{padding-bottom:12px}
.divider{height:1px;background:#f1f5f9;margin:0}
</style>
</head>
<body>

<!-- в•җв•җв•җв•җ MAIN VIEW в•җв•җв•җв•җ -->
<div id="main-view">
<div class="wrap">

<div class="hdr">
  <span class="logo">ProBet</span>
  <div class="dot"></div>
  <span style="font-size:11px;color:rgba(255,255,255,.5)">Dashboard 7 dГӯas</span>
  <span class="hdr-date" id="hdr-date">31 Mar вҖ” 6 Abr 2026</span>
</div>

<div class="dstrip" id="dstrip"></div>

<div class="stabs">
  <button class="stab active" id="stab-fut" onclick="setSport('fut',this)">вҡҪ FГәtbol</button>
  <button class="stab" id="stab-ten" onclick="setSport('ten',this)">рҹҺҫ Tenis</button>
  <button class="stab" id="stab-nba" onclick="setSport('nba',this)">рҹҸҖ NBA</button>
  <button class="stab" id="stab-cmb" onclick="setSport('cmb',this)">рҹ“Ҡ Combinadas</button>
</div>

<!-- в•җв•җ FГҡTBOL в•җв•җ -->
<div class="sport-sec active" id="sp-fut">
  <div class="lfilt" id="league-filt">
    <button class="lf active" onclick="setLeague('all',this)">Todas</button>
    <button class="lf" onclick="setLeague('ucl',this)">рҹҸҶ UCL</button>
    <button class="lf" onclick="setLeague('laliga',this)">рҹҮӘрҹҮё LaLiga</button>
    <button class="lf" onclick="setLeague('epl',this)">рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ Premier</button>
    <button class="lf" onclick="setLeague('bun',this)">рҹҮ©рҹҮӘ Bundesliga</button>
    <button class="lf" onclick="setLeague('sa',this)">рҹҮ®рҹҮ№ Serie A</button>
    <button class="lf" onclick="setLeague('l1',this)">рҹҮ«рҹҮ· Ligue 1</button>
    <button class="lf" onclick="setLeague('int',this)">рҹҢҚ Selecciones</button>
  </div>
  <div id="fut-cards"></div>
</div>

<!-- в•җв•җ TENIS в•җв•җ -->
<div class="sport-sec" id="sp-ten">
  <div class="lfilt">
    <button class="lf active" id="ten-all" onclick="setTenisCat('all',this)">Todos</button>
    <button class="lf" onclick="setTenisCat('atp',this)">ATP</button>
    <button class="lf" onclick="setTenisCat('wta',this)">WTA</button>
    <button class="lf" onclick="setTenisCat('picks',this)">рҹҺҜ Picks</button>
  </div>
  <div id="ten-cards"></div>
</div>

<!-- в•җв•җ NBA в•җв•җ -->
<div class="sport-sec" id="sp-nba">
  <div class="lfilt">
    <button class="lf active" id="nba-all" onclick="setNbaCat('all',this)">Todos</button>

function formDots(arr){return arr.map(f=>`<div class="fd f${f}">${f}</div>`).join('')}

function renderFootball(){
  const d=document.getElementById('fut-cards');d.innerHTML='';
  let matches=MATCHES.filter(m=>selLeague==='all'||m.league===selLeague);
  if(selDay!==null) matches=matches.filter(m=>m.day===selDay);
  if(matches.length===0){d.innerHTML='<p style="color:rgba(255,255,255,.4);font-size:13px;padding:1rem 0">No hay partidos para esta selecciГіn.</p>';return;}
  // Group by league
  const groups={};
  matches.forEach(m=>{const k=m.comp;if(!groups[k])groups[k]=[];groups[k].push(m);});
  Object.entries(groups).forEach(([comp,ms])=>{
    const sh=document.createElement('div');sh.className='sh';
    const flag=comp.split(' ')[0];
    sh.innerHTML=`<span class="sh-ico">${flag}</span><span class="sh-lbl">${comp.replace(flag,'').trim()}</span><div class="sh-line"></div>`;
    d.appendChild(sh);
    ms.forEach(m=>{
      const w=winner(m.odds);
      const card=document.createElement('div');card.className='mc';
      const isUCL=m.league==='ucl';
      card.innerHTML=`
        <div class="mc-head ${isUCL?'ucl':'fut'}">
          <span class="mc-time">${m.time}</span>
          <span class="mc-title">${m.home} <span style="opacity:.6">vs</span> ${m.away}</span>
          <span class="mc-ctx">${m.ha} ${m.hp}% В· ${m.ap}%</span>
          <span class="mc-arrow">вҖә</span>
        </div>
        <div class="qstats">
          <div class="qs"><span class="qs-v">${m.stats.gpg}</span><span class="qs-l">Goles/p</span></div>
          <div class="qs"><span class="qs-v">xG ${m.stats.xgH}</span><span class="qs-l">xG local</span></div>
          <div class="qs"><span class="qs-v">${m.stats.cs}</span><span class="qs-l">PorterГӯas 0<div class="form">${formDots(m.form.h)}</div></span></div>
        </div>
        <div class="pb-w"><div class="pb-l"><span>${m.ha} ${m.hp}%</span><span>Emp ${m.dp}%</span><span>${m.ap}% ${m.aa}</span></div>
        <div class="pbar"><div class="ph" style="width:${m.hp}%"></div><div class="pd" style="width:${m.dp}%"></div><div class="pa" style="width:${m.ap}%"></div></div></div>
        <div class="odds">
          <div class="ob${w==='h'?' best':''}"><span class="ol">${m.ha}</span><span class="ov">${m.odds.h.toFixed(2)}</span></div>
          <div class="ob${w==='d'?' best':''}"><span class="ol">Empate</span><span class="ov">${m.odds.d.toFixed(2)}</span></div>
          <div class="ob${w==='a'?' best':''}"><span class="ol">${m.aa}</span><span class="ov">${m.odds.a.toFixed(2)}</span></div>
        </div>
        <div class="pick-row">
          <span class="pick-lbl">Apuesta recomendada</span>
          <div class="pick-chips">
            ${m.valueBets.slice(0,2).map(v=>`<span class="chip chip-s">${v.pick} @${v.odd}</span>`).join('')}
          </div>
        </div>`;
      card.addEventListener('click',()=>openDetail('fut',m.id));
      d.appendChild(card);
    });
  });
}

function winner(odds){
  if(!odds)return'h';
  const {h,d,a}=odds;
  if(h<=a&&h<=d)return'h';
  if(a<h&&a<=d)return'a';
  return'd';
}

function renderTenis(){
  const d=document.getElementById('ten-cards');d.innerHTML='';
  let items=TENNIS.filter(t=>selTenis==='all'||t.cat===selTenis);
  if(items.length===0){d.innerHTML='<p style="color:rgba(255,255,255,.4);font-size:13px;padding:1rem 0">No hay partidos.</p>';return;}
  const sh=document.createElement('div');sh.className='sh';
  sh.innerHTML=`<span class="sh-ico">рҹҺҫ</span><span class="sh-lbl">Partidos en curso / semana</span><div class="sh-line"></div>`;
  d.appendChild(sh);
  items.forEach(t=>{
    const card=document.createElement('div');card.className='mc';
    const isLive=t.status==='live';
    const isFin=t.status==='final';
    const setBoxes=(sets,p)=>sets.map(s=>{
      const won=isFin&&p===0?s.p1>s.p2:isFin&&p===1?s.p2>s.p1:false;
      const cls=won?'sbox w':isLive?'sbox lv':'sbox';
      return`<div class="${cls}">${p===0?s.p1:s.p2}</div>`;
    }).join('');
    card.innerHTML=`
      <div class="mc-head ten">
        ${isLive?'<span class="mc-live-badge">EN VIVO</span>':''}
        ${isFin?'<span class="mc-time">FIN</span>':''}
        ${!isLive&&!isFin?'<span class="mc-time">PrГіx.</span>':''}
        <span class="mc-title">${t.tournament}</span>
        <span class="mc-arrow">вҖә</span>
      </div>
      <div class="sets-r"><span class="sp">${t.p1} <span style="font-size:9px;color:var(--tg)">#${t.stats.p1.rank}</span></span><div class="sboxes">${setBoxes(t.sets,0)}</div></div>
      <div class="sets-r"><span class="sp">${t.p2} <span style="font-size:9px;color:var(--tg)">#${t.stats.p2.rank}</span></span><div class="sboxes">${setBoxes(t.sets,1)}</div></div>
      <div class="odds2">
        <div class="ob${t.odds2.p1<=t.odds2.p2?' best':''}"><span class="ol">${t.p1.split(' ').pop()}</span><span class="ov">${t.odds2.p1.toFixed(2)}</span></div>

      </div>
      ${t.valueBets.length?`<div class="pick-row"><span class="pick-lbl">Pick</span><div class="pick-chips">${t.valueBets.slice(0,2).map(v=>`<span class="chip chip-s">${v.pick} @${v.odd}</span>`).join('')}</div></div>`:''}`;
    card.addEventListener('click',()=>openDetail('ten',t.id));
    d.appendChild(card);
  });
}

  });
}

      <div class="dv-hero">
        <div class="dv-head ten" style="background:var(--a2)">

          <div class="sets-r"><span class="sp" style="font-weight:800">${t.p1}</span><div class="sboxes">${t.sets.map(s=>`<div class="${isFin&&s.p1>s.p2?'sbox w':isLive?'sbox lv':'sbox'}">${s.p1}</div>`).join('')}</div></div>
          <div class="sets-r"><span class="sp" style="font-weight:800">${t.p2}</span><div class="sboxes">${t.sets.map(s=>`<div class="${isFin&&s.p2>s.p1?'sbox w':isLive?'sbox lv':'sbox'}">${s.p2}</div>`).join('')}</div></div>

          <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--tg);margin-bottom:8px">EstadГӯsticas de superficie</div>

          <div class="ob${t.odds2.p2<t.odds2.p1?' best':''}"><span class="ol">${t.p2}</span><span class="ov">${t.odds2.p2.toFixed(2)}</span></div>
        </div>
        ${t.valueBets.length?`<div class="vbet-card"><div class="vbet-title">рҹҺҜ Apuestas de valor</div>${t.valueBets.map(v=>`<div class="vbet-row"><div><div class="vbet-pick">${v.pick}</div><div class="vbet-why">${v.why}</div></div><div class="vbet-odd">@${v.odd.toFixed(2)}</div></div>`).join('')}</div>`:''}

            <div style="font-size:16px;opacity:.6">VS</div>
            <div style="text-align:center"><div style="font-size:20px;font-weight:800">${n.aa}</div>${isFin?`<div style="font-size:32px;font-weight:800;color:${n.score.a>n.score.h?'#86efac':'#fff'}">${n.score.a}</div>`:'<div style="font-size:14px;opacity:.7">@${n.odds2.a.toFixed(2)}</div>'}</div>
          </div>
        </div>
        <div style="padding:12px 16px;border-bottom:1px solid #f1f5f9">

            <div class="adv-card"><div class="adv-label">Def Rating ${n.ha}</div><div style="font-size:22px;font-weight:800;color:#f97316">${n.stats.drtg.h}</div></div>
            <div class="adv-card"><div class="adv-label">Off Rating ${n.aa}</div><div style="font-size:22px;font-weight:800;color:#6366f1">${n.stats.ortg.a}</div></div>

function closeDetail(){
  document.getElementById('detail-view').classList.remove('open');
  document.getElementById('main-view').style.display='block';
}

function renderStatBar(name,h,a,ha,aa){
  const tot=h+a||1;
  return`<div class="cmp-row">
    <div class="cmp-v">${h}</div>
    <div><div class="cmp-name">${name}</div><div class="cmp-bar"><div class="fill-h" style="width:${(h/tot*100).toFixed(0)}%"></div><div class="fill-a" style="width:${(a/tot*100).toFixed(0)}%"></div></div></div>
    <div class="cmp-v">${a}</div>
  </div>`;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CONTROLS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

function buildDateStrip(){
  const ds=document.getElementById('dstrip');ds.innerHTML='';
  DAYS.forEach((d,i)=>{
    const btn=document.createElement('div');btn.className=`db${i===0?' active today':''}`;
    btn.innerHTML=`<span class="dn">${d.dn}</span><span class="dd">${d.d}</span><span class="dm">${d.dm}</span>`;
    btn.onclick=()=>{selDay=i;document.querySelectorAll('.db').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAll()};
    ds.appendChild(btn);
  });
}

function setSport(s,btn){
  selSport=s;
  document.querySelectorAll('.stab').forEach(b=>{b.classList.remove('active','t-active','n-active','c-active')});
  if(s==='ten')btn.classList.add('t-active');
  else if(s==='nba')btn.classList.add('n-active');
  else if(s==='cmb')btn.classList.add('c-active');
  else btn.classList.add('active');
  document.querySelectorAll('.sport-sec').forEach(el=>el.classList.remove('active'));
  document.getElementById(`sp-${s}`).classList.add('active');
  renderAll();
}

function setLeague(l,btn){selLeague=l;document.querySelectorAll('#league-filt .lf').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderFootball();}
function setTenisCat(c,btn){selTenis=c;document.querySelectorAll('#sp-ten .lf').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTenis();}
function setNbaCat(c,btn){selNba=c;document.querySelectorAll('#sp-nba .lf').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderNba();}

function renderAll(){
  if(selSport==='fut')renderFootball();
  else if(selSport==='ten')renderTenis();
  else if(selSport==='nba')renderNba();
  else if(selSport==='cmb')renderCombos();
}

// INIT
buildDateStrip();
renderFootball();
renderTenis();
renderNba();
renderCombos();
</script>
